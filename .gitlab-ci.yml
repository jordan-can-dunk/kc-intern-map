stages:
  - install
  - validate
  - build
  - test
  - deploy
  - release

# --- WORKFLOW ---
# Only run pipelines for tags, MRs, and the default branch.
# When a version bump pushes both a commit and a tag, suppress the branch
# pipeline so only the tag pipeline runs.

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $CI_COMMIT_TAG == null


# --- DEFAULTS ---

default:
  image: node:22.22.3
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull

# --- INSTALL ---
# Install project dependencies, populate the project cache for all other jobs

install:
  stage: install
  script:
    - git config --global user.email "ci@dimin.com"
    - git config --global user.name "CI/CD"
    - npm config set @dimensional-innovations:registry https://gitlab.com/api/v4/packages/npm/
    - npm config set //gitlab.com/api/v4/packages/npm/:_authToken ${CI_JOB_TOKEN}
    - npm config set //gitlab.com/api/v4/projects/:_authToken ${CI_JOB_TOKEN}
    - npm ci
  # Override default cache config to set policy to pull-push
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push

# --- VALIDATE ---
# Run linters, audits, etc

validate_lint:
  stage: validate
  rules:
    - if: $CI_COMMIT_TAG
      allow_failure: true
    - when: on_success
  script:
    - npm run lint

# --- BUILD ---
# Build all projects, creating artifacts for release

build:
  stage: build
  variables:
    VITE_CMS_URL: https://ach-foundation.centroxs.com
  script:
    - npm run build
  artifacts:
    paths:
      - dist/**/*

# --- DEPLOY ---
# Deploy built artifacts to hosting infrastructure

deploy_amplify:
  stage: deploy
  image: amazonlinux:2
  rules:
    - if: $CI_COMMIT_TAG
  dependencies:
    - build
  cache: {}
  variables:
    AWS_DEFAULT_REGION: us-east-2
  before_script:
    - yum install -y aws-cli zip python3 curl
  script:
    - cd dist && zip -r ../dist.zip . && cd ..
    - DEPLOYMENT=$(aws amplify create-deployment --app-id "$AMPLIFY_APP_ID" --branch-name main)
    - JOB_ID=$(echo "$DEPLOYMENT" | python3 -c "import sys,json; print(json.load(sys.stdin)['jobId'])")
    - ZIP_URL=$(echo "$DEPLOYMENT" | python3 -c "import sys,json; print(json.load(sys.stdin)['zipUploadUrl'])")
    - curl --upload-file dist.zip "$ZIP_URL"
    - aws amplify start-deployment --app-id "$AMPLIFY_APP_ID" --branch-name main --job-id "$JOB_ID"

# --- RELEASE ---
# Capture the deployment as a GitLab release tied to the version tag.

release_gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  before_script:
    - apk add --no-cache git curl
    - curl -sSL https://github.com/orhun/git-cliff/releases/download/v2.12.0/git-cliff-2.12.0-x86_64-unknown-linux-musl.tar.gz | tar -xz -C /tmp
    - mv /tmp/git-cliff-2.12.0/git-cliff /usr/local/bin/git-cliff
  script:
    # Generate changelog for this tag only
    - git-cliff --tag ${CI_COMMIT_TAG} --unreleased --strip all > release_notes.md
    
    - |
      release-cli create \
        --name "Release ${CI_COMMIT_TAG}" \
        --tag-name "${CI_COMMIT_TAG}" \
        --description "$(cat release_notes.md)"
