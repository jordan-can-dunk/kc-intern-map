<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a101f">
    <meta name="description" content="The Fountain City Atlas — an intern's guide to Kansas City, pinned by the interns who came before you.">
    <title>The Fountain City Atlas · KC Intern Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Limelight&family=Marcellus&family=Josefin+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap"
      rel="stylesheet"
    >
    <script>
      // Set the theme before first paint to avoid a flash of the wrong palette.
      ;(function () {
        var saved = null
        try { saved = localStorage.getItem('fca-theme') } catch (e) { /* private mode */ }
        var theme = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        document.documentElement.dataset.theme = theme
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
